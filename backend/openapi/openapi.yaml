openapi: 3.1.0
info:
  title: ELVA Notify API
  version: 2.0.0
  description: |
    Machine-readable contract for the ELVA Notify Platform backend API.

    **Authentication:** `appId` and `apiKey` are sent in the JSON request body on protected endpoints.
    See [/docs/api/authentication](/docs/api/authentication) for the narrative guide.

    **Narrative docs:** [OTP](/docs/api/otp) · [Notify](/docs/api/notify) · [Error Codes](/docs/api/error-codes)

    **Not in this spec:** `GET /` returns the static HTML platform landing page (non-API).

servers:
  - url: http://localhost:4000
    description: Local development
  - url: '{baseUrl}'
    description: Production
    variables:
      baseUrl:
        default: https://api.example.com

tags:
  - name: Health
    description: Service health checks
  - name: OTP
    description: OTP generation, delivery, and verification
  - name: Notify
    description: Unified SMS and email notifications

paths:
  /health:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      description: |
        Returns service status. No authentication required.
        Used by load balancers and monitoring.
      x-elva-auth:
        required: false
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/HealthResponse'
              example:
                status: ok
                service: elva-otp-service
                timestamp: '2026-06-05T00:00:00.000Z'
                requestId: f59eeec5-4413-427b-b636-d955d3e5bd99
      x-related-docs:
        - title: Error Codes
          href: /docs/api/error-codes

  /otp/send:
    post:
      operationId: otpSend
      tags: [OTP]
      summary: Send OTP
      description: |
        Generates a 6-digit OTP, stores a salted hash in Redis (TTL 5 minutes), and delivers via SMS or email.

        **Middleware:** `validateAppApiKey` → `checkOtpSendCooldown` (SMS only) → `rateLimitOtpSend` → global rate limit.

        **Rate limits (send/resend only):**
        - Global: 10 requests/minute per appId (or apiKey / IP fallback)
        - Per phone: 3/minute, 10/hour

        **Cooldown (SMS only):** Redis key blocks rapid resends after successful SMS send.

        **SMS delivery:** When `OTP_DLT_ENABLED=true` and the app is mapped in `otp-mappings.json`
        with `dltEnabled: true`, OTP SMS uses Fast2SMS `route=dlt` (e.g. eNandi `LOGIN_OTP`).
        Otherwise OTP uses Fast2SMS `route=q` (legacy free-text).

        **OTP templates (`LOGIN_OTP`, `LOGIN_OTP_WITH_ID`):** Use this endpoint only — not `POST /notify`.

        See [/docs/api/otp](/docs/api/otp) for full narrative.
      x-elva-auth:
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: './components/schemas.yaml#/OtpSendSmsRequest'
                - $ref: './components/schemas.yaml#/OtpSendEmailRequest'
            examples:
              sms:
                summary: SMS (default channel) — eNandi LOGIN_OTP via DLT
                value:
                  appId: eNandi
                  apiKey: your-secret-key
                  phone: '918660397320'
              smsWithLoginId:
                summary: SMS — LOGIN_OTP_WITH_ID (optional loginId)
                value:
                  appId: eNandi
                  apiKey: your-secret-key
                  phone: '918660397320'
                  loginId: user_7488
              email:
                summary: EMAIL channel
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  channel: EMAIL
                  email: user@example.com
      responses:
        '200':
          description: OTP sent successfully
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/OtpSendSuccess'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ValidationError'
        '401':
          description: Missing or invalid credentials
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/UnauthorizedError'
        '403':
          description: Invalid app credentials
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ForbiddenError'
        '429':
          description: Rate limited or cooldown active
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './components/errors.yaml#/RateLimitedError'
                  - $ref: './components/errors.yaml#/RateLimitedGlobalError'
                  - $ref: './components/errors.yaml#/CooldownActiveError'
        '502':
          description: Provider failed to send OTP (OTP revoked from Redis)
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/SmsFailedError'
        '500':
          description: Unexpected server error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/InternalError'
      x-related-docs:
        - title: OTP API
          href: /docs/api/otp
        - title: Authentication
          href: /docs/api/authentication
        - title: Error Codes
          href: /docs/api/error-codes

  /otp/resend:
    post:
      operationId: otpResend
      tags: [OTP]
      summary: Resend OTP
      description: |
        Revokes any existing OTP for the contact, then sends a new OTP (same flow as send).

        Same middleware, rate limits, and cooldown rules as `POST /otp/send`.
      x-elva-auth:
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: './components/schemas.yaml#/OtpSendSmsRequest'
                - $ref: './components/schemas.yaml#/OtpSendEmailRequest'
            examples:
              sms:
                summary: Resend via SMS
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  phone: '919876543210'
      responses:
        '200':
          description: OTP resent successfully
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/OtpSendSuccess'
        '400':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ValidationError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/UnauthorizedError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ForbiddenError'
        '429':
          description: Rate limited or cooldown
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './components/errors.yaml#/RateLimitedError'
                  - $ref: './components/errors.yaml#/CooldownActiveError'
        '502':
          description: SMS/email provider failure
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/SmsFailedError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/InternalError'
      x-related-docs:
        - title: OTP API
          href: /docs/api/otp
        - title: Error Codes
          href: /docs/api/error-codes

  /otp/verify:
    post:
      operationId: otpVerify
      tags: [OTP]
      summary: Verify OTP
      description: |
        Validates the submitted OTP against the Redis hash. Consumes OTP on success.
        Max 3 failed attempts before `max_attempts` (429).

        Not rate-limited by OTP send middleware; subject to global rate limit only.
      x-elva-auth:
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: './components/schemas.yaml#/OtpVerifySmsRequest'
                - $ref: './components/schemas.yaml#/OtpVerifyEmailRequest'
            examples:
              sms:
                summary: Verify SMS OTP
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  phone: '919876543210'
                  otp: '123456'
              email:
                summary: Verify email OTP
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  email: user@example.com
                  otp: '123456'
      responses:
        '200':
          description: OTP verified
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/OtpVerifySuccess'
        '400':
          description: Invalid input, contact, app id, or OTP format
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './components/errors.yaml#/ValidationError'
                  - $ref: './components/errors.yaml#/InvalidInputError'
                  - $ref: './components/errors.yaml#/InvalidContactError'
                  - $ref: './components/errors.yaml#/InvalidAppIdError'
                  - $ref: './components/errors.yaml#/InvalidOtpFormatError'
        '401':
          description: OTP mismatch
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/MismatchError'
        '403':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ForbiddenError'
        '404':
          description: No active OTP (includes expired — service returns not_found)
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/NotFoundError'
        '429':
          description: Too many failed attempts or global rate limit
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './components/errors.yaml#/MaxAttemptsError'
                  - $ref: './components/errors.yaml#/RateLimitedGlobalError'
        '500':
          description: Internal error
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/InternalError'
      x-related-docs:
        - title: OTP API
          href: /docs/api/otp
        - title: Error Codes
          href: /docs/api/error-codes

  /notify:
    post:
      operationId: notifySend
      tags: [Notify]
      summary: Send notification
      description: |
        Unified notification endpoint. Mode is determined by `channel` and body fields:

        | Mode | Required fields |
        |------|-----------------|
        | Legacy SMS | `channel: SMS`, `to`, `message` |
        | DLT SMS | `channel: SMS`, `to`, `templateKey`, `variables` (appId identifies the business) |
        | Email HTML | `channel: EMAIL`, `to`, `subject`, `html` |
        | Email template | `channel: EMAIL`, `to`, `subject`, `template`, optional `data` |

        Mixed `message` + `templateKey` returns 400.

        **OTP templates — use OTP API, not notify:**

        | Template | Endpoint |
        |----------|----------|
        | `LOGIN_OTP` | `POST /otp/send` · `POST /otp/verify` · `POST /otp/resend` |
        | `LOGIN_OTP_WITH_ID` | Same OTP endpoints (+ optional `loginId` on send/resend) |

        Sending `LOGIN_OTP` or `LOGIN_OTP_WITH_ID` via `/notify` returns **400**
        `otp_template_not_supported`. ELVA generates and verifies OTP codes; clients must not pass `otp` in `/notify`.

        **Transactional templates on `/notify`:** `ORDER_PLACED`, `ORDER_DELIVERED`, `OUT_FOR_DELIVERY`.

        See [/docs/api/notify](/docs/api/notify) and [/docs/businesses/enandi](/docs/businesses/enandi).
      x-elva-auth:
        required: true
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: './components/schemas.yaml#/NotifyLegacySmsRequest'
                - $ref: './components/schemas.yaml#/NotifyDltSmsRequest'
                - $ref: './components/schemas.yaml#/NotifyEmailHtmlRequest'
                - $ref: './components/schemas.yaml#/NotifyEmailTemplateRequest'
            examples:
              legacySms:
                summary: Legacy SMS
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  channel: SMS
                  to: ['919876543210']
                  message: Your refund of Rs. 500 has been processed.
              dltSms:
                summary: DLT template SMS — ORDER_PLACED
                value:
                  appId: eNandi
                  apiKey: your-secret-key
                  channel: SMS
                  to: ['918660397320']
                  templateKey: ORDER_PLACED
                  variables:
                    customerName: Arun
                    businessName: eNandi
                    orderId: ORD-2026-001
              dltSmsOtpBlocked:
                summary: LOGIN_OTP via notify (rejected — use OTP API)
                value:
                  appId: eNandi
                  apiKey: your-secret-key
                  channel: SMS
                  to: ['918660397320']
                  templateKey: LOGIN_OTP
                  variables:
                    businessName: eNandi
                    otp: '482910'
              emailHtml:
                summary: Email HTML
                value:
                  appId: enandi-app
                  apiKey: your-secret-key
                  channel: EMAIL
                  to: [user@example.com]
                  subject: Welcome to eNandi
                  html: '<h1>Welcome!</h1>'
      responses:
        '200':
          description: Notification sent
          content:
            application/json:
              schema:
                $ref: './components/schemas.yaml#/NotifySuccess'
        '400':
          description: Validation, channel, or template errors
          content:
            application/json:
              schema:
                oneOf:
                  - $ref: './components/errors.yaml#/ValidationError'
                  - $ref: './components/errors.yaml#/InvalidChannelError'
                  - $ref: './components/errors.yaml#/UnsupportedBusinessError'
                  - $ref: './components/errors.yaml#/InvalidTemplateError'
                  - $ref: './components/errors.yaml#/OtpTemplateNotSupportedError'
                  - $ref: './components/errors.yaml#/MissingVariableError'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/UnauthorizedError'
        '403':
          description: Forbidden
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/ForbiddenError'
        '429':
          description: Global rate limit
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/RateLimitedGlobalError'
        '500':
          description: Provider or server failure
          content:
            application/json:
              schema:
                $ref: './components/errors.yaml#/NotificationFailedError'
      x-related-docs:
        - title: Notify API
          href: /docs/api/notify
        - title: eNandi Business
          href: /docs/businesses/enandi
        - title: Error Codes
          href: /docs/api/error-codes
